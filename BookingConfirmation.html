        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;700;900&display=swap" rel="stylesheet">

    <body style="margin:0;">
        <div class="menu">

                <div class="header-logo">
                    <img src="black_logo.png" alt="Study Hive logo with honeycomb design and slogan 'Bee in the Zone'">
                </div>
                <div class="header-nav">
                    <a href="index.html">Homepage</a>

                </div>

        <div class="intro">
            <h1 style="color:#FFFDF7;">Booking Confirmed</h1>

        <div class="white">    
            <div class="container" id="confirmationDetails">
            </div>
        </div>

        <div class="footer">
            <div class="container">

                    <img src="black_logo.png" alt="Study Hive logo with honeycomb design and slogan 'Bee in the Zone'">

 <script>
        const bookingDetails = JSON.parse(localStorage.getItem("bookingDetails"));
        
        if (bookingDetails) {
            const confirmationDiv = document.getElementById("confirmationDetails");
            confirmationDiv.innerHTML = `
                <h2 style="text-align:center;">Booking Details:</h2>
                    <p style="text-align:center;">Period ${bookingDetails.period}, ${bookingDetails.day}</p>
                    <p style="text-align:center;">${bookingDetails.room}</p>
            `;
        } else {
            window.location.href = "Bookings.html";
        }
    </script>
    </body>
